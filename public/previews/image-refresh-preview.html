<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ixquisite Image Refresh Preview</title>
  <style>
    :root {
      --bg: #f4efe8;
      --surface: #fbf7f1;
      --ink: #111827;
      --muted: #5b6574;
      --line: rgba(15, 34, 55, 0.14);
      --accent: #b39664;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top, rgba(179, 150, 100, 0.12), transparent 28%), var(--bg);
    }
    .wrap {
      width: min(1200px, calc(100vw - 2.2rem));
      margin: 0 auto;
      padding: 1.4rem 0 3rem;
      display: grid;
      gap: 1.1rem;
    }
    .head {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }
    .kicker {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    h1 {
      margin: 0.45rem 0 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.8rem, 3.2vw, 2.6rem);
      line-height: 1;
    }
    .sub {
      margin: 0.55rem 0 0;
      color: var(--muted);
      line-height: 1.55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
    }
    .img {
      min-height: 220px;
      background: #1f2a37;
      overflow: hidden;
    }
    .img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .body {
      padding: 0.9rem 1rem;
      display: grid;
      gap: 0.55rem;
    }
    .pill {
      display: inline-flex;
      width: fit-content;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .title {
      margin: 0;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
    }
    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }
    .prompt {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.45;
      color: #334155;
      border-top: 1px solid var(--line);
      padding-top: 0.5rem;
    }
    @media (max-width: 940px) {
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .card { grid-template-columns: 1fr; }
      .img { min-height: 250px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="head">
      <p class="kicker">Preview Board</p>
      <h1>Ixquisite Image Refresh Direction</h1>
      <p class="sub">
        This board shows the <strong>current image used</strong> in each slot and the <strong>proposed replacement direction</strong>.
        Final generation starts after your approval.
      </p>
    </section>

    <section class="grid" id="cards"></section>
  </main>

  <script>
    const slots = [
      { section: "Homepage Hero", key: "Cocoa Ceremony Suit", ratio: "4:5", current: "/images/ixquisite/cocoa-outdoor-brown-suit.jpg", prompt: "Premium cocoa double-breasted hero with calm architecture and clean negative space." },
      { section: "Category", key: "Suits", ratio: "3:4", current: "/images/ixquisite/hero-teal-double-breasted.jpg", prompt: "Full-body tailored silhouette in deep navy, luxury campaign quality." },
      { section: "Category", key: "Shirts", ratio: "3:4", current: "/images/ixquisite/ivory-navy-look.jpg", prompt: "Crisp ivory shirt focus with refined layering and texture clarity." },
      { section: "Category", key: "Trousers", ratio: "3:4", current: "/images/ixquisite/taupe-double-breasted-look.jpg", prompt: "Trouser-led composition with crease detail and polished footwear." },
      { section: "Category", key: "Ties", ratio: "3:4", current: "/images/ixquisite/cocoa-suit-close.jpg", prompt: "Tie knot and lapel close-up, rich textile detail, no clutter." },
      { section: "Category", key: "Accessories", ratio: "3:4", current: "/images/ixquisite/black-ceremony-suit.jpg", prompt: "Accessories-led frame: cufflinks, pocket square, belt finish details." },
      { section: "Occasion", key: "Office", ratio: "16:10", current: "/images/ixquisite/navy-pinstripe-jacket.jpg", prompt: "Modern office authority portrait with structured tailoring." },
      { section: "Occasion", key: "Executive", ratio: "16:10", current: "/images/ixquisite/hero-teal-double-breasted.jpg", prompt: "Boardroom leadership portrait, polished premium mood." },
      { section: "Occasion", key: "Wedding Guest", ratio: "16:10", current: "/images/ixquisite/cocoa-outdoor-brown-suit.jpg", prompt: "Ceremony-ready cocoa tailoring with elegant event ambience." },
      { section: "Collection", key: "Boardroom Edit", ratio: "21:9", current: "/images/ixquisite/hero-teal-double-breasted.jpg", prompt: "Wide cinematic boardroom collection hero with navy/charcoal palette." },
      { section: "Collection", key: "Executive Essentials", ratio: "21:9", current: "/images/ixquisite/ivory-navy-look.jpg", prompt: "Wide hero focused on crisp shirt + sharp tailoring essentials." },
      { section: "Collection", key: "Signature Neutrals", ratio: "21:9", current: "/images/ixquisite/cocoa-suit-close.jpg", prompt: "Wide hero in warm espresso and ivory neutrals, soft premium light." },
      { section: "Product", key: "Midnight Commander Suit", ratio: "4:5", current: "/images/ixquisite/navy-pinstripe-jacket.jpg", prompt: "PDP hero image with true fabric rendering and ecommerce framing." },
      { section: "Product", key: "Ivory Broadcloth Shirt", ratio: "4:5", current: "/images/ixquisite/ivory-navy-look.jpg", prompt: "PDP shirt hero with collar precision and clean studio background." },
      { section: "Editorial", key: "Brown Suit Guide", ratio: "16:10", current: "/images/ixquisite/cocoa-outdoor-brown-suit.jpg", prompt: "Magazine-style styling scene for brown-suit guidance article." },
      { section: "Editorial", key: "Shirt and Tie Guide", ratio: "16:10", current: "/images/ixquisite/cocoa-suit-close.jpg", prompt: "Editorial close-up for shirt and tie combinations, premium textile focus." }
    ];

    const cards = document.getElementById("cards");

    for (const slot of slots) {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="img"><img src="${slot.current}" alt="Current ${slot.key} image" loading="lazy" /></div>
        <div class="body">
          <span class="pill">${slot.section}</span>
          <h2 class="title">${slot.key}</h2>
          <p class="meta">Current source: <code>${slot.current}</code></p>
          <p class="meta">Target ratio: <strong>${slot.ratio}</strong></p>
          <p class="prompt">${slot.prompt}</p>
        </div>
      `;

      cards.appendChild(card);
    }
  </script>
</body>
</html>
